<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; width:100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Devanagari', sans-serif;
            background: #fff;
            color: #333;
        }
        body.d { background: #1a1a1a; color: #e0e0e0; }
        .c {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 12px;
        }
        .h {
            text-align: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        .d .h { border-color: #444; }
        h1 { font-size: 1.8em; color: #d4a574; margin-bottom: 2px; }
        .st { font-size: 0.85em; color: #666; }
        .d .st { color: #aaa; }
        .tb { display: flex; gap: 8px; flex-wrap: wrap; }
        select { flex: 1; min-width: 100px; padding: 8px; border: 2px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 0.9em; cursor: pointer; }
        .d select { background: #333; border-color: #555; color: #e0e0e0; }
        .ct {
            flex: 1;
            overflow-y: auto;
            background: #f9f7f4;
            padding: 20px;
            border-radius: 8px;
            font-size: 1em;
            line-height: 1.8;
            -webkit-overflow-scrolling: touch;
        }
        .d .ct { background: #2a2a2a; }
        .t1 { font-size: 1.6em; color: #d4a574; margin-bottom: 5px; font-weight: 600; }
        .t2 { font-size: 1.1em; color: #d4a574; margin: 15px 0 8px 0; }
        .m { font-size: 0.9em; color: #888; margin-bottom: 15px; }
        .d .m { color: #999; }
        .txt { white-space: pre-wrap; word-wrap: break-word; }
        .d .txt { color: #d0d0d0; }
        .bt { display: flex; gap: 8px; }
        button { flex: 1; padding: 8px; border: none; border-radius: 6px; background: #d4a574; color: white; font-weight: 600; cursor: pointer; font-size: 0.9em; }
        button:active { transform: scale(0.95); }
        .sec { background: #666; }
        .mark { background: #27ae60; }
        .mark.yes { background: #7f8c8d; }
        @media (max-width: 500px) {
            .c { padding: 8px; gap: 8px; }
            h1 { font-size: 1.5em; }
            .ct { padding: 15px; }
            select, button { font-size: 0.85em; padding: 6px; }
        }
    </style>
</head>
<body>
<div class="c">
    <div class="h">
        <h1>श्रीमद् दासबोध</h1>
        <p class="st">समर्थ रामदास स्वामी • संपूर्ण • ऑफलाइन</p>
    </div>
    <div class="tb">

class R {
    constructor() {
        this.d=1; this.s=0;
        this.dm = localStorage.getItem('dbm')==='1';
        this.rd = JSON.parse(localStorage.getItem('drd')||'{}');
        this.lp = JSON.parse(localStorage.getItem('dlp')||'{}');
        this.init();
    }
    init() {
        if(this.dm) document.body.classList.add('d');
        const ds = document.getElementById('d');
        ds.innerHTML = '<option>दशक निवडा</option>' +
            DB.dashaks.map(x => `<option value="${x.number}">दशक ${x.number}</option>`).join('');
        this.load();
        this.listen();
        this.rnd();
    }
    listen() {
        document.getElementById('d').onchange = () => this.cd();
        document.getElementById('s').onchange = () => this.cs();
        document.getElementById('mb').onclick = () => this.mark();
        document.getElementById('pb').onclick = () => this.nav(-1);
        document.getElementById('nb').onclick = () => this.nav(1);
        document.getElementById('ty').onclick = () => { this.d=1; this.s=0; this.upd(); this.rnd(); };
    }
    upd() {
        const x = DB.dashaks.find(y => y.number === this.d);
        const ss = document.getElementById('s');
        ss.innerHTML = '<option>समास निवडा</option>' +
            (x?.samas || []).map((y,i) => `<option value="${i}">${y.title.substring(0,40)}</option>`).join('');
    }
    cd() {
        this.d = parseInt(document.getElementById('d').value) || 1;
        this.s = 0;
        this.upd();
        this.rnd();
    }
    cs() {
        this.s = parseInt(document.getElementById('s').value) || 0;
        this.rnd();
    }
    load() {
        if(this.lp.d) {
            this.d = this.lp.d;
            this.s = this.lp.s;
            document.getElementById('d').value = this.d;
            this.upd();
            document.getElementById('s').value = this.s;
        }
    }
    save() {
        this.lp = {d:this.d, s:this.s};
        localStorage.setItem('dlp', JSON.stringify(this.lp));
    }
    rnd() {
        this.save();
        const dash = DB.dashaks.find(x => x.number === this.d);
        const sama = dash?.samas[this.s];
        if(!sama) return;
        const k = `${this.d}-${this.s}`;
        const h = `
            <div class="t1">दशक ${this.d}</div>
            <div class="t2">${sama.title}</div>
            <div class="m">📖 ${this.d}/20 | 📄 ${this.s+1}/${dash.samas.length} ${this.rd[k]?'✓':''}</div>
            <div class="txt">${sama.content.replace(/</g,'&lt;')}</div>
        `;
        document.getElementById('ct').innerHTML = h;
        document.getElementById('ct').scrollTop = 0;
        const mb = document.getElementById('mb');
        if(this.rd[k]) {
            mb.textContent = '✓ वाचले आज';
            mb.classList.add('yes');
        } else {
            mb.textContent = '✓ वाचले';
            mb.classList.remove('yes');
        }
    }
    mark() {
        const k = `${this.d}-${this.s}`;
        if(!this.rd[k]) {
            this.rd[k] = new Date().toISOString().split('T')[0];
            localStorage.setItem('drd', JSON.stringify(this.rd));
            this.rnd();
        }
    }
    nav(dir) {
        const x = DB.dashaks.find(y => y.number === this.d);
        if(dir>0) {
            if(this.s < x.samas.length-1) this.s++;
            else if(this.d < 20) { this.d++; this.s=0; }
        } else {
            if(this.s > 0) this.s--;
            else if(this.d > 1) { this.d--; this.s = DB.dashaks.find(y => y.number===this.d).samas.length-1; }
        }
        document.getElementById('d').value = this.d;
        this.upd();
        document.getElementById('s').value = this.s;
